<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Chibi 3D Pixel Quest</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000;
            overflow: hidden; font-family: 'Trebuchet MS', sans-serif;
            touch-action: none; user-select: none;
        }
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
            image-rendering: pixelated;
        }
        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; z-index: 10;
        }
        .hud-container { padding: 20px; display: flex; gap: 15px; }
        .hud-box {
            background: rgba(15, 20, 30, 0.85);
            border: 3px solid #f1c40f; border-radius: 8px;
            padding: 10px 20px; color: #FFF; font-size: 1.4rem; font-weight: bold;
            display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-shadow: 1px 1px 2px #000;
            border-image: linear-gradient(to right, #f1c40f, #e67e22) 1;
        }
        #message {
            position: absolute; top: 35%; width: 100%; text-align: center;
            color: #fff; text-shadow: 0 0 10px #00ffff, 0 0 20px #3498db, 2px 2px 0 #000;
            font-size: 2.5rem; font-weight: 900; letter-spacing: 2px;
            opacity: 0; transform: scale(0.8); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #controls {
            display: none; width: 100%; height: 30%; pointer-events: auto;
            position: absolute; bottom: 0;
        }
        .btn-ctrl {
            position: absolute; bottom: 30px; width: 70px; height: 70px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.4) 100%);
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 1.8rem; backdrop-filter: blur(4px);
            box-shadow: 0 6px 0 rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.5);
        }
        .btn-ctrl:active { 
            transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.5);
        }
        #btn-left { left: 30px; }
        #btn-right { left: 120px; }
        #btn-jump { right: 30px; width: 80px; height: 80px; }

        #flashOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #FFF; opacity: 0; pointer-events: none;
            z-index: 5; transition: opacity 0.5s;
        }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 120%);
            pointer-events: none; z-index: 2;
        }

        #endScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: flex-end;
            padding-bottom: 8%; pointer-events: none; z-index: 20;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
        }
        #theEndBtn {
            pointer-events: auto; padding: 15px 50px; font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white; border: 3px solid #ffeaa7; border-radius: 30px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 3px 5px rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s;
        }
        #theEndBtn:active { transform: translateY(8px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        #dialogueBox {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; 
            background: linear-gradient(to bottom, rgba(15,20,30,0.4), rgba(5,10,15,0.4));
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            border: 3px solid rgba(189, 195, 199, 0.7); border-radius: 12px; padding: 10px 20px; color: #FFF;
            font-size: 1.2rem; line-height: 1.4; display: none; z-index: 15;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-shadow: 1px 1px 0 #000;
        }
        #dialogueName {
            position: absolute; top: -16px; left: 20px; background: #e74c3c;
            padding: 2px 15px; border-radius: 5px; font-size: 1rem; font-weight: bold;
            border: 2px solid #FFF; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        #transitionCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; display: none;
        }
        #finalText {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 5rem; font-weight: 900; letter-spacing: 5px;
            text-shadow: 0 0 20px #fff, 0 0 40px #f1c40f; opacity: 0; z-index: 60; pointer-events: none;
            transition: opacity 3s ease-in-out; display: none; text-align: center;
        }
        #finalSubText {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            color: #ff7675; font-size: 3rem; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px #ff7675, 0 0 30px #d63031, 2px 2px 0 #000;
            opacity: 0; z-index: 60; pointer-events: none;
            transition: opacity 2s ease-in-out; display: none; text-align: center;
        }
        @media (hover: none) and (pointer: coarse) { #controls { display: block; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="vignette"></div>
    <div id="uiLayer">
        <div class="hud-container">
            <div class="hud-box" id="hudText">🌟 Keys: 0/4</div>
            <div class="hud-box" id="scoreText">🪙 Score: 0</div>
        </div>
        <div id="message"></div>
        <div id="controls">
            <div class="btn-ctrl" id="btn-left">◀</div>
            <div class="btn-ctrl" id="btn-right">▶</div>
            <div class="btn-ctrl" id="btn-jump">▲</div>
        </div>
        <div id="dialogueBox">
            <div id="dialogueName">TI AN</div><span id="dialogueText"></span>
        </div>
    </div>
    <div id="flashOverlay"></div>
    <canvas id="transitionCanvas"></canvas>
    <div id="finalText">The End</div>
    <div id="finalSubText">Happy Birthday Leonita!</div>
    <div id="endScreen"><button id="theEndBtn" onclick="playHeartTransition()">THE END</button></div>

    <script>
        // ==========================================
        // 0. AUDIO SYSTEM (Web Audio API Synthesizer)
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        let audioUnlocked = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                audioCtx.resume().then(() => { audioUnlocked = true; });
            }
        }
        window.addEventListener('keydown', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);

        function playTone(freq, type, duration, vol=0.1, slideFreq=null) {
            if(audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const SFX = {
            jump: () => playTone(300, 'square', 0.2, 0.05, 600),
            bump: () => playTone(150, 'sawtooth', 0.1, 0.1),
            coin: () => { playTone(987, 'sine', 0.1, 0.05); setTimeout(()=>playTone(1318, 'sine', 0.2, 0.05), 80); },
            key: () => { playTone(523, 'square', 0.1, 0.05); setTimeout(()=>playTone(659, 'square', 0.1, 0.05), 100); setTimeout(()=>playTone(1046, 'square', 0.3, 0.05), 200); },
            win: () => {
                const notes = [523, 659, 783, 1046, 783, 1046, 1318, 1567];
                notes.forEach((f, i) => setTimeout(()=>playTone(f, 'square', 0.15, 0.1), i*100));
            },
            talk: () => playTone(400 + Math.random() * 300, 'square', 0.03, 0.02),
            oof: () => playTone(450, 'sawtooth', 0.15, 0.1, 250) // Suara jatuh ala Roblox
        };

        // ==========================================
        // 1. PROCEDURAL TEXTURES (HD PIXEL ART)
        // ==========================================
        function createPixelTexture(w, h, drawFn) {
            const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d'); drawFn(ctx, w, h);
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createBeautifulSky() {
            const canvas = document.createElement('canvas');
            canvas.width = 2; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#0f0c29'); 
            gradient.addColorStop(0.5, '#302b63'); 
            gradient.addColorStop(1, '#ff6e7f'); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 512);
            return new THREE.CanvasTexture(canvas);
        }

        const textures = {
            grass: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#27ae60'; ctx.fillRect(0,0,w,h);
                for(let i=0; i<15; i++) { ctx.fillStyle = Math.random()>0.5 ? '#2ecc71' : '#1e8449'; ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 1, 1); }
            }),
            dirt: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#8B4513'; ctx.fillRect(0,0,w,h);
                for(let i=0; i<20; i++) { ctx.fillStyle = Math.random()>0.5 ? '#A0522D' : '#5c2a11'; ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 2, 2); }
            }),
            brick: createPixelTexture(128, 128, (ctx, w, h) => {
                ctx.fillStyle = '#c0392b'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(4, 4, w-8, h/2 - 8);
                ctx.fillRect(4, h/2 + 4, w/2 - 8, h/2 - 8);
                ctx.fillRect(w/2 + 4, h/2 + 4, w/2 - 8, h/2 - 8);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(4, 4, w-8, 4);
                ctx.fillRect(4, h/2 + 4, w/2 - 8, 4);
                ctx.fillRect(w/2 + 4, h/2 + 4, w/2 - 8, 4);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(4, h/2 - 8, w-8, 4);
                ctx.fillRect(4, h - 8, w/2 - 8, 4);
                ctx.fillRect(w/2 + 4, h - 8, w/2 - 8, 4);
            }),
            wood: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#D7CCC8'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#8D6E63'; for(let i=0; i<4; i++) ctx.fillRect(0, i*4 + 1, w, 1);
                ctx.fillStyle = '#5D4037'; ctx.fillRect(0,0,1,h); ctx.fillRect(0,0,w,1);
            }),
            leaves: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#006266'; ctx.fillRect(0,0,w,h);
                for(let i=0; i<25; i++) { ctx.fillStyle = Math.random()>0.5 ? '#188A36' : '#22B14C'; ctx.fillRect(Math.floor(Math.random()*w), Math.floor(Math.random()*h), 2, 2); }
            }),
            wall: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(0,0,8,8); ctx.fillRect(8,8,8,8);
            }),
            houseWall: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#fdf5e6'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#fae5d3'; for(let i=0; i<h; i+=4) ctx.fillRect(0, i, w, 1);
            }),
            stonePath: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(1,1,6,6); ctx.fillRect(9,9,6,6); ctx.fillRect(1,9,4,4); ctx.fillRect(9,1,4,4);
            }),
            tile: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(0,0,8,8); ctx.fillRect(8,8,8,8);
            }),
            water: createPixelTexture(32, 32, (ctx, w, h) => {
                ctx.fillStyle = '#3498db'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#5dade2'; ctx.fillRect(0,4,16,2); ctx.fillRect(16,12,16,2); ctx.fillRect(8,24,16,2);
            }),
            eggGlass: createPixelTexture(64, 64, (ctx, w, h) => {
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(0,0,w,h); 
                ctx.fillStyle = '#2980b9'; 
                ctx.fillRect(4, 4, 26, 26); ctx.fillRect(34, 4, 26, 26);
                ctx.fillRect(4, 34, 26, 26); ctx.fillRect(34, 34, 26, 26);
                ctx.fillStyle = '#5dade2'; 
                ctx.fillRect(4, 4, 26, 4); ctx.fillRect(34, 4, 26, 4);
                ctx.fillRect(4, 34, 26, 4); ctx.fillRect(34, 34, 26, 4);
            }),
            boardText: createPixelTexture(512, 128, (ctx, w, h) => {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,w,h);
                ctx.font = 'bold 32px "Trebuchet MS"'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('HIT THE BOX WITH YOUR HEAD', w/2, h/2);
            }),
            itemBlock: createPixelTexture(128, 128, (ctx, w, h) => {
                ctx.fillStyle = '#e67e22'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(6,6,w-12,h-12);
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(6,6,w-12,8);
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(6,h-14,w-12,8);
                ctx.fillStyle = '#c0392b';
                ctx.beginPath(); ctx.arc(16,16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w-16,16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(16,h-16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w-16,h-16,6,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 80px "Trebuchet MS"';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#d35400'; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4; ctx.shadowBlur = 0;
                ctx.fillText('?', w/2, h/2 + 5);
            }),
            itemBlockEmpty: createPixelTexture(128, 128, (ctx, w, h) => {
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(6,6,w-12,h-12);
                ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(6,6,w-12,8);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(6,h-14,w-12,8);
                ctx.fillStyle = '#34495e';
                ctx.beginPath(); ctx.arc(16,16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w-16,16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(16,h-16,6,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w-16,h-16,6,0,Math.PI*2); ctx.fill();
            }),
            animeEyes: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#FFE0BD'; ctx.fillRect(0,0,w,h); 
                ctx.fillStyle = '#000'; ctx.fillRect(2, 4, 4, 8); ctx.fillRect(10, 4, 4, 8);
                ctx.fillStyle = '#FFF'; ctx.fillRect(2, 5, 2, 3); ctx.fillRect(10, 5, 2, 3);
                ctx.fillStyle = '#3498db'; ctx.fillRect(3, 8, 2, 3); ctx.fillRect(11, 8, 2, 3);
            }),
            boyEyes: createPixelTexture(16, 16, (ctx, w, h) => {
                ctx.fillStyle = '#FFE0BD'; ctx.fillRect(0,0,w,h); 
                ctx.fillStyle = '#000'; ctx.fillRect(2, 4, 4, 8); ctx.fillRect(10, 4, 4, 8);
                ctx.fillStyle = '#FFF'; ctx.fillRect(2, 5, 2, 3); ctx.fillRect(10, 5, 2, 3);
                ctx.fillStyle = '#8A9A5B'; // Hazel eyes
                ctx.fillRect(3, 8, 2, 3); ctx.fillRect(11, 8, 2, 3);
            })
        };

        // ==========================================
        // 2. PHYSICS ENGINE & LEVEL DESIGN
        // ==========================================
        const GRAVITY = 0.35; const JUMP_FORCE = -7.5; const MOVE_SPEED = 2.8;
        const WORLD_WIDTH = 6000; 
        
        const player = { x: 50, y: 120, w: 12, h: 20, vx: 0, vy: 0, grounded: false, facingRight: true, walkFrame: 0, respawning: false, respawnTimer: 0 };
        const platforms = []; const sceneries = []; const coinsData = [];
        const streetlamps = []; const birds = []; const chimneySmokes = []; const fireworks = [];
        
        const fragments = [
            { id: 1, name: 'Classroom', x: 0, y: 0, collected: false, revealed: false, mesh: null },
            { id: 2, name: 'Monument', x: 0, y: 0, collected: false, revealed: false, mesh: null },
            { id: 3, name: 'Pool', x: 0, y: 0, collected: false, revealed: false, mesh: null },
            { id: 4, name: 'House', x: 0, y: 0, collected: false, revealed: false, mesh: null }
        ];
        
        const houseDoor = { x: 5475, y: 120, w: 30, h: 50 }; 

        let gameState = 'PLAYING'; 
        let keysCollected = 0; let score = 0; let animationTimer = 0;
        let dialogueText = "Happy birthday my dear lemon! 🎂🎈\nMay this day be full of happiness!";
        let dialogueCharIndex = 0; let dialogueTimer = 0; let endingPhase = 0; 
        let checkpoint = { x: 50, y: 120 };

        // Controls
        const keys = { left: false, right: false, up: false };
        window.addEventListener('keydown', (e) => {
            unlockAudio();
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.up = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.up = false;
        });
        ['left', 'right', 'jump'].forEach(dir => {
            const btn = document.getElementById(`btn-${dir}`);
            const keyMap = { left: 'left', right: 'right', jump: 'up' };
            btn.addEventListener('touchstart', (e)=>{e.preventDefault(); keys[keyMap[dir]]=true; unlockAudio();});
            btn.addEventListener('touchend', (e)=>{e.preventDefault(); keys[keyMap[dir]]=false;});
        });

        // ==========================================
        // 3. THREE.JS HD-2D ENGINE
        // ==========================================
        let scene, camera, renderer, dirLight, hemiLight;
        let player3D, boy3D, assemblyKeys = [], bigKey;
        let starsGroup, cloudsGroup;
        const particleSystem = []; const fireflies = [];

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.001); 

            camera = new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight, false); 
            renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.domElement.id = 'gameCanvas'; document.body.appendChild(renderer.domElement);

            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6); scene.add(hemiLight);
            dirLight = new THREE.DirectionalLight(0xffe0a0, 1.2); 
            dirLight.position.set(100, 200, 150); dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -350; dirLight.shadow.camera.right = 350;
            dirLight.shadow.camera.top = 250; dirLight.shadow.camera.bottom = -250;
            scene.add(dirLight);

            // Parallax Stars
            starsGroup = new THREE.Group();
            const starsGeo = new THREE.BufferGeometry(); const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 2});
            const starPos = [];
            for(let i=0; i<600; i++) {
                starPos.push((Math.random()-0.5) * 8000); starPos.push(80 + Math.random() * 300); starPos.push(-200 - Math.random() * 200);  
            }
            starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starsGroup.add(new THREE.Points(starsGeo, starsMat));
            scene.add(starsGroup);

            cloudsGroup = new THREE.Group(); scene.add(cloudsGroup);

            build3DWorld();
            player3D = createChibiCharacter(0xe84393, false);
            scene.add(player3D.group);
            buildEndingRoom(); spawnFireflies();
        }

        function getMaterial(tex, rX, rY) {
            let t = tex.clone(); t.needsUpdate = true; t.repeat.set(rX, rY);
            return new THREE.MeshStandardMaterial({ map: t, roughness: 0.8 });
        }
        function createBox(w, h, d, mat, cast=true) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.castShadow = cast; mesh.receiveShadow = true; return mesh;
        }

        // Fungsi createRoundedBoxMesh kini langsung menggunakan BoxGeometry untuk mencegah tekstur piksel rusak
        function createRoundedBoxMesh(w, h, d, radius, mat) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.castShadow = true; mesh.receiveShadow = true;
            return mesh;
        }

        function build3DWorld() {
            // Tutup semua void dengan lantai dasar visual di bagian paling bawah

        function updateChimneySmoke() {
            if (Math.abs(player.x - 5400) < 1000) {
                if (Math.random() < 0.1) {
                    let s = new THREE.Mesh(sharedSmokeGeo, sharedSmokeMat);
                    s.position.set(5430 + (Math.random()-0.5)*5, -145, -50); 
                    s.userData = { vy: Math.random()*0.5 + 0.5, vx: (Math.random()-0.5)*0.5, life: 1.0 };
                    scene.add(s); chimneySmokes.push(s);
                }
            }
            for (let i = chimneySmokes.length - 1; i >= 0; i--) {
                let s = chimneySmokes[i];
                s.position.x += s.userData.vx; s.position.y += s.userData.vy;
                s.userData.life -= 0.01; 
                s.scale.setScalar(Math.max(0.001, s.userData.life));
                if(s.userData.life <= 0) { scene.remove(s); chimneySmokes.splice(i, 1); }
            }
        }

        const dayColor = new THREE.Color(0x87CEEB);
        const duskColor = new THREE.Color(0xff6e7f);
        const nightColor = new THREE.Color(0x0f0c29);

        function update() {
            if (gameState === 'PLAYING') {
                if (keys.left) { player.vx = -MOVE_SPEED; player.facingRight = false; player.walkFrame += 0.4; }
                else if (keys.right) { player.vx = MOVE_SPEED; player.facingRight = true; player.walkFrame += 0.4; }
                else { player.vx *= 0.7; player.walkFrame = 0; } 

                if (Math.abs(player.vx) < 0.1) player.vx = 0;
                if (keys.up && player.grounded) { player.vy = JUMP_FORCE; player.grounded = false; spawnParticles(player.x + player.w/2, player.y + player.h, 0xffffff); SFX.jump(); }

                player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;
                if (player.x < 0) player.x = 0; if (player.x + player.w > WORLD_WIDTH) player.x = WORLD_WIDTH - player.w;

                // Sistem Checkpoint & Respawn
                if (player.grounded) {
                    let currentPlat = platforms.find(p => 
                        player.x + player.w/2 >= p.x && 
                        player.x + player.w/2 <= p.x + p.w &&
                        Math.abs((player.y + player.h) - p.y) <= 12
                    );
                    if (currentPlat && currentPlat.w >= 100 && currentPlat.y <= 170) {
                        checkpoint.x = player.x;
                        checkpoint.y = player.y - 5;
                    }
                }

                let inPool = player.x + player.w/2 > 4400 && player.x + player.w/2 < 4600 && player.y > 55;
                if (player.y > 180 || inPool) {
                    player.x = checkpoint.x;
                    player.y = checkpoint.y;
                    player.vx = 0;
                    player.vy = 0;
                    
                    // Memulai animasi respawn & efek suara mati
                    player3D.group.scale.set(0, 0, 0); 
                    player.respawning = true;
                    player.respawnTimer = 0;
                    
                    showMessage("Check Point!");
                    SFX.oof(); // Suara jatuh "Oof" ala Roblox
                }

                // Animasi respawn membesar (0 menuju 0.85)
                if (player.respawning) {
                    player.respawnTimer += 0.04;
                    let s = Math.min(0.85, player.respawnTimer);
                    player3D.group.scale.set(s, s, s);
                    if (player.respawnTimer >= 0.85) player.respawning = false;
                }

                // Moving platforms physics
                platforms.forEach(p => {
                    if(p.moving) {
                        p.x += p.vx; if(p.mesh) p.mesh.position.x = p.x + p.w/2;
                        if(p.x > p.maxX || p.x < p.minX) p.vx *= -1;
                    }
                });

                player.grounded = false;
                platforms.forEach(p => {
                    if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                        if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 12) {
                            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
                            if(p.moving) player.x += p.vx; 
                        } 
                        else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 12) {
                            player.y = p.y + p.h; player.vy = 0; 
                            if (p.type === 'item_block' && !p.hit) {
                                p.hit = true; SFX.bump();
                                if(p.mesh) { 
                                    p.mesh.position.y += 8; 
                                    setTimeout(() => { 
                                        p.mesh.position.y -= 8; 
                                        p.mesh.material = getMaterial(textures.itemBlockEmpty, p.w/16, p.h/16); 
                                    }, 150); 
                                }
                                let frag = fragments.find(f => f.id === p.fragmentId);
                                if (frag) {
                                    frag.revealed = true; frag.mesh.visible = true;
                                    frag.x = p.x + p.w/2; frag.y = p.y - 30; 
                                    frag.mesh.position.set(frag.x, -frag.y, 0); spawnParticles(p.x + p.w/2, p.y, 0x00ffff);
                                }
                            }
                        } else {
                            if (player.vx > 0) player.x = p.x - player.w; else if (player.vx < 0) player.x = p.x + p.w;
                        }
                    }
                });

                // Coins
                coinsData.forEach(c => {
                    if(!c.collected) {
                        c.mesh.rotation.y += 0.05;
                        if (player.x < c.x + 10 && player.x + player.w > c.x - 10 && player.y < c.y + 15 && player.y + player.h > c.y - 15) {
                            c.collected = true; c.mesh.visible = false; score += 10;
                            document.getElementById('scoreText').innerText = `🪙 Score: ${score}`;
                            SFX.coin(); spawnParticles(c.x, c.y, 0xf1c40f);
                        }
                    }
                });

                // Interactive Sceneries (Birds & Streetlamps)
                birds.forEach(bird => {
                    if (!bird.mesh.userData.flying) {
                        let dist = Math.abs(player.x - bird.x);
                        if (dist < 50) bird.mesh.userData.flying = true;
                        if(Math.random()<0.02) bird.mesh.position.y = bird.mesh.userData.originY + 2;
                        else bird.mesh.position.y += (bird.mesh.userData.originY - bird.mesh.position.y)*0.2;
                    } else {
                        bird.mesh.position.x += 3; bird.mesh.position.y += 2;
                        bird.mesh.userData.wing.rotation.x = Math.sin(Date.now()/30);
                    }
                });

                streetlamps.forEach(lamp => {
                    let dist = Math.abs(player.x - lamp.x);
                    if (dist < 300) {
                        lamp.light.intensity = Math.min(2, lamp.light.intensity + 0.1);
                        lamp.bulb.material.color.setHex(0xffffff);
                    } else {
                        lamp.light.intensity = Math.max(0, lamp.light.intensity - 0.05);
                        lamp.bulb.material.color.setHex(0x7f8c8d);
                    }
                });

                updateChimneySmoke();

                // Keys
                fragments.forEach(f => {
                    if (f.revealed && !f.collected) {
                        f.mesh.rotation.y += 0.08; f.mesh.position.y = -f.y + Math.sin(Date.now()/150)*6; 
                        if (player.x < f.x + 15 && player.x + player.w > f.x - 15 && player.y < f.y + 15 && player.y + player.h > f.y - 15) {
                            f.collected = true; f.mesh.visible = false; keysCollected++;
                            document.getElementById('hudText').innerText = `🌟 Keys: ${keysCollected}/4`;
                            spawnParticles(f.x, f.y, 0x00ffff); SFX.key();
                            if (keysCollected < 4) { showMessage(`${f.name} Key Found!`); } 
                            else {
                                gameState = 'ASSEMBLING'; document.getElementById('flashOverlay').style.opacity = 0.8;
                                setTimeout(() => { document.getElementById('flashOverlay').style.opacity = 0; }, 600);
                                keys.left = keys.right = keys.up = false; prepareAssembly();
                            }
                        }
                    }
                });

                // Door
                if (player.x < houseDoor.x + houseDoor.w && player.x + player.w > houseDoor.x && player.y < houseDoor.y + houseDoor.h && player.y + player.h > houseDoor.y) {
                    if (keysCollected === 4) {
                        gameState = 'TRANSITION'; document.getElementById('flashOverlay').style.transition = "opacity 2s"; document.getElementById('flashOverlay').style.opacity = 1;
                        SFX.win();
                        setTimeout(() => {
                            gameState = 'ENDING'; document.querySelector('.hud-container').style.display = 'none';
                            camera.position.set(8000, -60, 220); camera.lookAt(8000, -80, 0); 
                            
                            // Pindahkan karakter pemain ke dalam ruangan ending
                            player3D.group.position.set(7900, -104, -5); 
                            player3D.group.rotation.y = Math.PI / 2;
                            
                            document.getElementById('flashOverlay').style.transition = "opacity 1.5s"; document.getElementById('flashOverlay').style.opacity = 0;
                            endingPhase = 0; 
                        }, 2000);
                    }
                }

                // Random Blinking
                if(Math.random() < 0.005) blinkCharacter(player3D);

                player3D.group.position.set(player.x + player.w/2, -player.y - player.h/2 + 2, 0);
                let targetRotY = player.facingRight ? Math.PI*0.15 : Math.PI*0.85;
                player3D.group.rotation.y += (targetRotY - player3D.group.rotation.y) * 0.25;

                if(player.walkFrame > 0 && player.grounded) {
                    let swing = Math.sin(player.walkFrame);
                    player3D.armL.rotation.x = swing * 1.5; player3D.armR.rotation.x = -swing * 1.5;
                    player3D.legL.rotation.x = -swing * 1.2; player3D.legR.rotation.x = swing * 1.2;
                    player3D.group.position.y += Math.abs(Math.sin(player.walkFrame*2))*3;
                    player3D.headGrp.rotation.z = Math.sin(player.walkFrame*1)*0.1; 
                } else {
                    player3D.armL.rotation.x = player3D.armR.rotation.x = 0; player3D.headGrp.rotation.z = 0;
                    if(!player.grounded) { player3D.legL.rotation.x = -0.6; player3D.legR.rotation.x = 0.6; player3D.armL.rotation.x = 2.8; player3D.armR.rotation.x = 2.8; } 
                    else { player3D.legL.rotation.x = player3D.legR.rotation.x = 0; }
                }

                // Parallax Backgrounds
                starsGroup.position.x = camera.position.x * 0.9;
                cloudsGroup.position.x = camera.position.x * 0.5;

                // Day/Night Lerp (Background Color)
                if (player.x > 1000 && player.x < 3600) { 
                    let t = (player.x - 1000) / 2600;
                    scene.fog.color.lerpColors(dayColor, duskColor, t);
                    scene.background = scene.fog.color;
                } else if (player.x >= 3600) { 
                    let t = Math.min(1, (player.x - 3600) / 2400);
                    scene.fog.color.lerpColors(duskColor, nightColor, t);
                    scene.background = scene.fog.color;
                }

                // Dynamic Camera (Zoomed Out to Z = 350)
                let targetCamX = player.x;
                if(targetCamX < 150) targetCamX = 150; if(targetCamX > WORLD_WIDTH - 150) targetCamX = WORLD_WIDTH - 150;
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                let targetCamY = -player.y + 20; 
                camera.position.y += (targetCamY - camera.position.y) * 0.1;
                camera.position.z = 350; 
                camera.lookAt(camera.position.x, camera.position.y - 20, 0);
                dirLight.position.x = camera.position.x + 80;

            } else if (gameState === 'ASSEMBLING') {
                animationTimer++; let px = player.x + player.w/2; let py = -player.y - player.h/2;
                if (animationTimer < 100) {
                    let radius = 60 - (animationTimer * 0.5);
                    for(let i=0; i<4; i++) {
                        let angle = (animationTimer * 0.15) + (i * Math.PI / 2);
                        assemblyKeys[i].position.set(px + Math.cos(angle)*radius, py + 25 + Math.sin(angle)*radius, 20);
                        assemblyKeys[i].rotation.x += 0.2; assemblyKeys[i].rotation.y += 0.2;
                    }
                } else if (animationTimer === 100) {
                    document.getElementById('flashOverlay').style.opacity = 1; assemblyKeys.forEach(k => k.visible = false);
                    bigKey.position.set(px, py + 35, 20); bigKey.visible = true; SFX.win();
                    setTimeout(() => { document.getElementById('flashOverlay').style.opacity = 0; }, 300);
                } else if (animationTimer > 100 && animationTimer < 180) {
                    bigKey.rotation.y += 0.15; bigKey.position.y = py + 35 + Math.sin(animationTimer*0.2)*6; 
                } else if (animationTimer >= 180) {
                    bigKey.visible = false; gameState = 'PLAYING';
                    document.getElementById('hudText').innerHTML = '✨ Legendary Key Forged! ✨';
                }
                player3D.armL.rotation.x = 2.5; player3D.armR.rotation.x = 2.5; player3D.headGrp.rotation.x = -0.3; 

            } else if (gameState === 'ENDING') {
                scene.userData.endingRoom.children.forEach(child => { if(child.userData && child.userData.offset !== undefined) { child.position.y += Math.sin(Date.now()/300 + child.userData.offset) * 0.2; }});

                if (endingPhase === 0) {
                    if (player3D.group.position.x < 7980) { 
                        player3D.group.position.x += 0.6; player3D.walkFrame = (player3D.walkFrame || 0) + 0.3;
                        let swing = Math.sin(player3D.walkFrame);
                        player3D.armL.rotation.x = swing * 1.5; player3D.armR.rotation.x = -swing * 1.5;
                        player3D.legL.rotation.x = -swing * 1.2; player3D.legR.rotation.x = swing * 1.2;
                        player3D.group.position.y = -104 + Math.abs(Math.sin(player3D.walkFrame*2))*3;
                    } else {
                        player3D.group.position.x = 7980;
                        player3D.armL.rotation.x = 0; player3D.armR.rotation.x = 0; player3D.legL.rotation.x = 0; player3D.legR.rotation.x = 0;
                        player3D.group.rotation.y = Math.PI / 2.5; endingPhase = 1; 
                    }
                    boy3D.group.position.y = 16 + Math.abs(Math.sin(Date.now()/200))*1.5;
                } else if (endingPhase === 1) {
                    if (boy3D.group.position.x > 40) { 
                        boy3D.group.position.x -= 0.6; boy3D.walkFrame = (boy3D.walkFrame || 0) + 0.3;
                        let swing = Math.sin(boy3D.walkFrame);
                        boy3D.armL.rotation.x = swing * 1.5; boy3D.legL.rotation.x = -swing * 1.2; boy3D.legR.rotation.x = swing * 1.2;
                        boy3D.group.position.y = 16 + Math.abs(Math.sin(boy3D.walkFrame*2))*2; player3D.group.position.y = -104; 
                    } else {
                        boy3D.group.position.x = 40; boy3D.group.rotation.y = -Math.PI / 4.5; 
                        boy3D.armL.rotation.x = 0; boy3D.legL.rotation.x = 0; boy3D.legR.rotation.x = 0; endingPhase = 2; 
                    }
                } else if (endingPhase === 2) {
                    player3D.walkFrame = (player3D.walkFrame || 0) + 0.15;
                    player3D.group.position.y = -104 + Math.abs(Math.sin(player3D.walkFrame))*12; 
                    player3D.armL.rotation.x = 3.1; player3D.armR.rotation.x = 3.1; 
                    player3D.legL.rotation.x = -0.5; player3D.legR.rotation.x = 0.5; 
                    player3D.headGrp.rotation.x = -0.2; 

                    // TI AN (Karakter Laki-Laki) Melompat setelah bicara selesai
                    if (dialogueCharIndex >= dialogueText.length) {
                        boy3D.walkFrame = (boy3D.walkFrame || 0) + 0.15;
                        boy3D.group.position.y = 16 + Math.abs(Math.sin(boy3D.walkFrame))*12;
                        boy3D.armL.rotation.x = 3.1; boy3D.armR.rotation.x = 3.1;
                        boy3D.legL.rotation.x = -0.5; boy3D.legR.rotation.x = 0.5;
                        boy3D.headGrp.rotation.x = -0.2;
                    } else {
                        boy3D.group.position.y = 16 + Math.abs(Math.sin(Date.now()/200))*1.5;
                    }

                    // FIREWORKS
                    if(Math.random() < 0.04 && typeof THREE.MeshBasicMaterial !== 'undefined') {
                         spawnFireworks(8000 + (Math.random()-0.5)*150, -50 + Math.random()*80);
                    }

                    if(Math.random() < 0.01) blinkCharacter(player3D);
                    if(Math.random() < 0.01) blinkCharacter(boy3D);

                    let dialogBox = document.getElementById('dialogueBox');
                    if(!dialogBox.style.display || dialogBox.style.display === 'none') { dialogBox.style.display = 'block'; }
                    if (dialogBox.style.display === 'block') {
                        if (dialogueTimer % 3 === 0 && dialogueCharIndex < dialogueText.length) {
                            dialogueCharIndex++; 
                            document.getElementById('dialogueText').innerText = dialogueText.substring(0, dialogueCharIndex);
                            let currentChar = dialogueText[dialogueCharIndex - 1];
                            if (currentChar !== ' ' && currentChar !== '\n') SFX.talk(); // Efek suara bicara ala RPG
                        }
                        dialogueTimer++;
                        if (dialogueCharIndex >= dialogueText.length && !document.getElementById('endScreen').style.display) { setTimeout(()=>{ document.getElementById('endScreen').style.display = 'flex'; }, 4000); }
                    }
                }
            }

            for (let i = particleSystem.length - 1; i >= 0; i--) {
                let p = particleSystem[i]; p.position.x += p.userData.vx; p.position.y += p.userData.vy; p.position.z += p.userData.vz;
                p.userData.vy -= 0.6; p.userData.life -= 0.04; p.scale.setScalar(Math.max(0.001, p.userData.life));
                if (p.userData.life <= 0) { 
                    scene.remove(p); 
                    if(p.userData.isFirst) { p.userData.geo.dispose(); p.userData.mat.dispose(); }
                    particleSystem.splice(i, 1); 
                }
            }
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let f = fireworks[i]; f.position.x += f.userData.vx; f.position.y += f.userData.vy; f.position.z += f.userData.vz;
                f.userData.vy -= 0.2; f.userData.life -= 0.02;
                f.scale.setScalar(Math.max(0.001, f.userData.life));
                if(f.userData.life <= 0) { 
                    scene.remove(f); 
                    if(f.userData.isFirst) { f.userData.geo.dispose(); f.userData.mat.dispose(); }
                    fireworks.splice(i, 1); 
                }
            }
            fireflies.forEach(f => {
                f.position.y = f.userData.startY + Math.sin(Date.now()*f.userData.speed + f.userData.offset)*20;
                f.position.x += Math.sin(Date.now()*0.001 + f.userData.offset)*0.5;
            });
        }

        function prepareAssembly() {
            for(let i=0; i<4; i++) { let k = createBox(10, 10, 10, new THREE.MeshBasicMaterial({color: 0x00ffff}), false); scene.add(k); assemblyKeys.push(k); }
            bigKey = new THREE.Group();
            let bMat = new THREE.MeshStandardMaterial({color: 0xf1c40f, metalness: 0.8, roughness: 0.2}); let coreMat = new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x0088ff});
            
            let shaft = createBox(50, 5, 5, bMat);
            let bow = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, 5, 6), bMat); bow.rotation.x = Math.PI/2; bow.position.set(-25, 0, 0);
            let innerBow = new THREE.Mesh(new THREE.CylinderGeometry(8, 8, 6, 6), new THREE.MeshBasicMaterial({color: 0x000000})); innerBow.rotation.x = Math.PI/2; innerBow.position.set(-25, 0, 0);
            let crossGuard = createBox(6, 22, 6, bMat); crossGuard.position.set(-12, 0, 0);
            let tooth1 = createBox(8, 14, 4, bMat); tooth1.position.set(16, -8, 0);
            let tooth2 = createBox(8, 10, 4, bMat); tooth2.position.set(24, -6, 0);
            let gem = new THREE.Mesh(new THREE.OctahedronGeometry(6, 0), coreMat); gem.position.set(-25, 0, 0);
            
            let glow = new THREE.PointLight(0x00ffff, 2, 100); 
            bigKey.add(shaft, bow, innerBow, crossGuard, tooth1, tooth2, gem, glow);
            bigKey.visible = false; scene.add(bigKey);
        }

        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        window.onload = function() { initThreeJS(); animate(); };
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight, false); });

        function playHeartTransition() {
            document.getElementById('theEndBtn').style.display = 'none';
            const tc = document.getElementById('transitionCanvas');
            tc.style.display = 'block'; tc.width = window.innerWidth; tc.height = window.innerHeight;
            const ctx = tc.getContext('2d');
            let scale = Math.max(window.innerWidth, window.innerHeight) / 10;

            function heartAnimate() {
                ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, tc.width, tc.height);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.save(); ctx.translate(tc.width/2, tc.height/2); ctx.scale(scale, scale);
                ctx.beginPath(); ctx.moveTo(0, 15); ctx.bezierCurveTo(0, 15, 20, -5, 20, -15); ctx.arc(10, -15, 10, 0, Math.PI, true);
                ctx.arc(-10, -15, 10, 0, Math.PI, true); ctx.bezierCurveTo(-20, -5, 0, 15, 0, 15); ctx.fill(); ctx.restore();

                scale *= 0.95; 
                if (scale > 0.05) { requestAnimationFrame(heartAnimate); } 
                else {
                    ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, tc.width, tc.height);
                    let ft = document.getElementById('finalText'); ft.style.display = 'block'; void ft.offsetWidth; ft.style.opacity = 1;
                    setTimeout(() => { let st = document.getElementById('finalSubText'); st.style.display = 'block'; void st.offsetWidth; st.style.opacity = 1; }, 3000);
                    setTimeout(() => location.reload(), 12000); 
                }
            }
            heartAnimate();
        }
    </script>
</body>
</html>
